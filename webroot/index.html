<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Little Snitch for Linux</title>
  <link rel="manifest" href="manifest.json" />
  <meta name="theme-color" content="#0d6abf" />
  <link rel="apple-touch-icon" href="littlesnitch-192.png" />
  <link rel="stylesheet" href="styles.css" />
  <link rel="stylesheet" href="connections.css" />
  <link rel="stylesheet" href="blocklists.css" />
  <link rel="stylesheet" href="rules.css" />
  <link rel="stylesheet" href="uPlot.min.css" />
  <link rel="stylesheet" href="traffic.css" />
</head>

<body>
  <!-- SVG symbols available throughout the app -->
  <svg width="0" height="0" style="position: absolute; overflow: hidden;" xmlns="http://www.w3.org/2000/svg">
    <defs>
      <symbol id="details-differ-red" viewBox="0 0 25 40">
        <g transform="translate(3.9661017,14)" style="stroke:#d33;stroke-width:3.23161912;stroke-linecap:round">
          <path d="M 8.5338983,-0.59181698 V 18.343556" />
          <path d="m 2.8478983,11.219014 5.686,7.124542" />
          <path d="M 14.219898,11.21914 8.5338983,18.343556" />
        </g>
      </symbol>
      <symbol id="details-differ-green" viewBox="0 0 25 40">
        <g transform="translate(3.9661017,14)" style="stroke:#2b2;stroke-width:3.23161912;stroke-linecap:round">
          <path d="M 8.5338983,-0.59181698 V 18.343556" />
          <path d="m 2.8478983,11.219014 5.686,7.124542" />
          <path d="M 14.219898,11.21914 8.5338983,18.343556" />
        </g>
      </symbol>
    </defs>
  </svg>

  <div class="app-shell">
    <header class="app-header">
      <div class="app-brand">
        <span class="brand-name">Little Snitch</span> for <span class="brand-platform">Linux</span>
      </div>
      <button class="about-button" type="button" aria-label="About Little Snitch for Linux" data-role="about-button">ⓘ</button>
      <div class="offline-indicator" data-role="offline-indicator" hidden aria-live="polite">
        Daemon offline — reconnecting…
      </div>
      <div class="header-tabs" role="tablist" aria-label="Sections">
        <button class="tab is-active" role="tab" aria-selected="true" data-section="connections">Connections</button>
        <button class="tab" role="tab" aria-selected="false" data-section="blocklists">Blocklists</button>
        <button class="tab" role="tab" aria-selected="false" data-section="rules">Rules</button>
        <button class="theme-toggle" type="button" aria-label="Toggle dark mode" data-role="theme-toggle">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor" xmlns="http://www.w3.org/2000/svg">
            <path d="M12 3a9 9 0 1 0 9 9c0-.46-.04-.92-.1-1.36a5.389 5.389 0 0 1-4.4 2.26 5.403 5.403 0 0 1-3.14-9.8c-.44-.06-.9-.1-1.36-.1z"/>
          </svg>
        </button>
      </div>
    </header>

    <dialog class="about-dialog" id="about-dialog" aria-label="About Little Snitch for Linux">
      <div class="about-dialog-content">
        <button class="about-close-button" type="button" aria-label="Close">×</button>
        <img class="about-icon" src="littlesnitch-192.png" alt="Little Snitch for Linux icon" width="96" height="96" />
        <h1 class="about-name">Little Snitch for Linux</h1>
        <div class="about-version" data-role="about-version"></div>
        <div class="about-commits">
          <span class="about-commit-label">Main commit</span>
          <span class="about-commit-value" data-role="about-main-commit" title="Main commit hash"></span>
          <span class="about-commit-label">eBPF commit</span>
          <span class="about-commit-value" data-role="about-ebpf-commit" title="eBPF commit hash"></span>
        </div>
        <div class="about-copyright" data-role="about-copyright"></div>
        <a class="about-website" data-role="about-website" target="_blank" rel="noopener noreferrer" hidden></a>
        <!-- Space reserved for future credits section -->
        <section class="about-credits" hidden></section>
      </div>
    </dialog>

    <main>
      <section class="section is-active" data-section="connections">
        <div class="section-topbar">
          <div class="control-group">
            <div class="search-wrap">
              <input class="search-input" type="search" placeholder="Filter connections..." data-role="search"
                data-section="connections" />
              <button class="search-clear-button" type="button" data-role="search-clear" aria-label="Clear search">
                ×
              </button>
            </div>
            <div class="filter-control" data-role="filter-control">
              <button class="filter-btn" type="button" data-role="filter-toggle" aria-haspopup="true" aria-expanded="false">
                <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                  <line x1="4" y1="6" x2="20" y2="6"/><line x1="8" y1="12" x2="16" y2="12"/><line x1="11" y1="18" x2="13" y2="18"/>
                </svg>
                <span class="filter-chips" data-role="filter-chips"></span>
                <span class="filter-placeholder" data-role="filter-placeholder">Filter</span>
              </button>
              <div class="filter-popup" data-role="filter-popup" hidden>
                <div class="filter-popup-row">
                  <label class="filter-popup-label">Direction</label>
                  <select class="menu-select" data-role="direction-filter">
                    <option value="both">In + Out</option>
                    <option value="out">Out only</option>
                    <option value="in">In only</option>
                  </select>
                </div>
                <div class="filter-popup-row">
                  <label class="filter-popup-label">Location</label>
                  <select class="menu-select" data-role="location-filter">
                    <option value="all">Internet + Local Networks</option>
                    <option value="internet">Internet only</option>
                    <option value="localnet">Local Networks only</option>
                    <option value="localhost">Local Host only</option>
                    <option value="everything">Everything</option>
                  </select>
                </div>
                <div class="filter-popup-row">
                  <label class="filter-popup-label">Action</label>
                  <select class="menu-select" data-role="verdict-filter">
                    <option value="any">Allowed + Denied</option>
                    <option value="allow">Allowed only</option>
                    <option value="deny">Denied only</option>
                  </select>
                </div>
              </div>
            </div>
            <select class="menu-select compact" data-role="visible-period-filter" title="Visible time period">
              <option value="60">Show 1 minute</option>
              <option value="600">Show 10 minutes</option>
              <option value="3600">Show 1 hour</option>
              <option value="21600">Show 6 hours</option>
              <option value="86400">Show 1 day</option>
              <option value="604800">Show 7 days</option>
              <option value="2592000">Show 30 days</option>
              <option value="none">Show all</option>
            </select>

            <span class="topbar-separator" aria-hidden="true"></span>
            <select class="menu-select compact" data-role="connections-sort" title="Sort">
              <option value="name">Sort by Name</option>
              <option value="lastActivity">Sort by Activity</option>
              <option value="totalData">Sort by Total Data</option>
              <option value="totalDataSent">Sort by Data Sent</option>
              <option value="totalDataReceived">Sort by Data Received</option>
            </select>
          </div>
        </div>

        <div class="split-layout" data-section="connections">
          <div class="pane left-pane" data-role="left-pane">
            <div class="pane-title">Connection List</div>
            <div class="pane-content list-container" data-role="list" id="connections-list"></div>
          </div>
          <div class="splitter" data-role="splitter" aria-hidden="true"></div>
          <div class="pane right-pane" data-role="right-pane">
            <div class="pane-title">Connection Details</div>
            <div class="pane-content details-container" data-role="details" id="inspector">
              <div id="rules"></div>
            </div>
          </div>
        </div>
        <div class="h-splitter" data-role="h-splitter" aria-hidden="true"></div>
        <div class="traffic-chart-wrap" id="traffic-chart"></div>
      </section>

      <section class="section" data-section="blocklists">
        <div class="section-topbar">
          <div class="control-group">
            <div class="search-wrap">
              <input class="search-input" type="search" placeholder="Filter blocklists..." data-role="search"
                data-section="blocklists" />
              <button class="search-clear-button" type="button" data-role="search-clear" aria-label="Clear search">
                ×
              </button>
            </div>
          </div>
        </div>

        <div class="split-layout" data-section="blocklists">
          <div class="pane left-pane" data-role="left-pane">
            <div class="pane-title">Blocklist List</div>
            <div class="pane-content list-container" data-role="list" id="blocklists"></div>
          </div>
          <div class="splitter" data-role="splitter" aria-hidden="true"></div>
          <div class="pane right-pane" data-role="right-pane">
            <div class="pane-title">Blocklist Details</div>
            <div class="pane-content details-container" data-role="details"></div>
          </div>
        </div>
      </section>

      <section class="section" data-section="rules">
        <div class="section-topbar">
          <div class="control-group">
            <div class="search-wrap">
              <input class="search-input" type="search" placeholder="Filter rules..." data-role="search"
                data-section="rules" />
              <button class="search-clear-button" type="button" data-role="search-clear" aria-label="Clear search">
                ×
              </button>
            </div>
          </div>
        </div>

        <div class="split-layout" data-section="rules">
          <div class="pane left-pane" data-role="left-pane">
            <div class="pane-title">Rule List</div>
            <div class="pane-content list-container" data-role="list" id="rules-list"></div>
          </div>
          <div class="splitter" data-role="splitter" aria-hidden="true"></div>
          <div class="pane right-pane" data-role="right-pane">
            <div class="pane-title">Rule Details</div>
            <div class="pane-content details-container" data-role="details" id="rules-details"></div>
          </div>
        </div>
      </section>
    </main>
  </div>

  <script src="uPlot.iife.min.js"></script>
  <script src="traffic.js"></script>
  <script src="connections.js"></script>
  <script src="blocklists.js"></script>
  <script src="rules.js"></script>
  <script src="app.js"></script>
</body>

</html>
