<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Little Snitch for Linux</title><!-- updated by applyLocalizationToDOM -->
    <link rel="manifest" href="manifest.json"/>
    <meta name="theme-color" content="#0d6abf"/>
    <link rel="icon" href="littlesnitch-192.png" sizes="192x192" type="image/png">
    <link rel="apple-touch-icon" href="littlesnitch-192.png"/>
    <script src="js/header-app.min.js"></script>
    <link rel="stylesheet" href="css/style.min.css"/>
</head>
<body>
<div class="app-shell">
    <header class="app-header">
        <div class="app-brand">
            <span class="brand-name">Little Snitch</span><span class="brand-connector"
                                                               data-i18n="brand-connector"> for </span><span
                class="brand-platform">Linux</span>
        </div>
        <button class="about-button" type="button" aria-label="About Little Snitch for Linux" data-role="about-button"
                data-i18n-aria-label="about-btn-label">
            <svg width="28" height="28" fill="currentColor">
                <use href="sprite/sprite.svg#info"/>
            </svg>
        </button>
        <div class="offline-indicator" data-role="offline-indicator" hidden aria-live="polite">
            <span data-i18n="daemon-offline">Daemon offline — reconnecting…</span>
        </div>
        <div class="undo-widget" data-role="undo-widget" hidden>
            <button class="undo-capsule" data-role="undo-bubble" type="button"
                    aria-haspopup="true" aria-expanded="false">
          <span class="undo-capsule-icon">
            <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                 stroke-linejoin="round">
              <path d="M3 7C3 4.5 5 2.5 8 2.5C11 2.5 13 4.5 13 7C13 9.5 11 11.5 8 11.5"/>
              <polyline points="3,4 3,7 6,7"/>
            </svg>
          </span>
                <span class="undo-capsule-label" data-role="undo-label"></span>
            </button>
            <div class="popup-menu undo-popup" data-role="undo-popup" hidden></div>
        </div>
        <label class="filter-switch" data-role="filter-switch" title="Enable or disable network filtering">
            <input type="checkbox" role="switch" class="filter-switch-input" data-role="filter-switch-input" checked/>
            <span class="filter-switch-track" aria-hidden="true"></span>
            <span class="filter-switch-label" data-i18n="filter-enabled">Network Filter enabled</span>
        </label>
        <div class="header-tabs" role="tablist" aria-label="Sections">
            <button class="tab is-active" role="tab" aria-selected="true" data-section="connections"
                    data-i18n="tab-connections">Connections
            </button>
            <button class="tab" role="tab" aria-selected="false" data-section="blocklists" data-i18n="tab-blocklists">
                Blocklists
            </button>
            <button class="tab" role="tab" aria-selected="false" data-section="rules" data-i18n="tab-rules">Rules
            </button>
            <div>
                <button class="theme-toggle" type="button" aria-label="Theme" data-role="theme-toggle"
                        aria-haspopup="true" aria-expanded="false">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"
                         xmlns="http://www.w3.org/2000/svg">
                        <path d="M12 3a9 9 0 1 0 9 9c0-.46-.04-.92-.1-1.36a5.389 5.389 0 0 1-4.4 2.26 5.403 5.403 0 0 1-3.14-9.8c-.44-.06-.9-.1-1.36-.1z"/>
                    </svg>
                </button>
                <div class="popup-menu theme-popup" data-role="theme-popup" hidden>
                    <button class="menu-item" type="button" data-role="theme-option" data-value=""
                            data-i18n="theme-os-default">
                        <svg width="18" height="18" fill="currentColor">
                            <use href="sprite/sprite.svg#theme-automatic" opacity="0.66"/>
                        </svg>
                        OS Default
                    </button>
                    <button class="menu-item" type="button" data-role="theme-option" data-value="light"
                            data-i18n="theme-light">
                        <svg width="18" height="18" fill="currentColor" s>
                            <use href="sprite/sprite.svg#theme-automatic" opacity="0.66"/>
                        </svg>
                        Light
                    </button>
                    <button class="menu-item" type="button" data-role="theme-option" data-value="dark"
                            data-i18n="theme-dark">
                        <svg width="18" height="18" fill="currentColor">
                            <use href="sprite/sprite.svg#theme-automatic" opacity="0.66"/>
                        </svg>
                        Dark
                    </button>
                </div>
            </div>
            <div data-role="logout-control" hidden>
                <button class="theme-toggle" type="button" aria-label="Logout" data-role="logout-toggle"
                        data-i18n-aria-label="logout-btn-label" aria-haspopup="true" aria-expanded="false">
                    <svg width="18" height="18" fill="currentColor">
                        <use href="sprite/sprite.svg#logout"/>
                    </svg>
                </button>
                <div class="popup-menu logout-popup" data-role="logout-popup" hidden>
                    <button class="menu-item" type="button" data-role="logout-item"></button>
                </div>
            </div>
        </div>
    </header>

    <div class="update-banner" data-role="update-banner" hidden>
        <span data-role="update-banner-text"></span>
        <a class="update-banner-btn" data-role="update-download-btn" target="_blank" rel="noopener noreferrer"
           data-i18n="update-download">Download…</a>
        <button class="update-banner-btn" data-role="update-snooze-btn" type="button" data-i18n="update-snooze">Remind
            me later
        </button>
        <button class="update-banner-btn" data-role="update-skip-btn" type="button" data-i18n="update-skip">Skip this
            version
        </button>
    </div>

    <dialog class="about-dialog" id="about-dialog" aria-label="About Little Snitch for Linux"
            data-i18n-aria-label="about-btn-label">
        <div class="about-dialog-content">
            <button class="about-close-button" type="button" aria-label="Close">×</button>
            <img class="about-icon" src="littlesnitch-192.png" alt="Little Snitch for Linux icon" width="96" height="96"
                 data-i18n-alt="about-icon-alt"/>
            <h1 class="about-name" data-i18n="app-title">Little Snitch for Linux</h1>
            <div class="about-version" data-role="about-version"></div>
            <div class="about-update-info" data-role="about-update-info"></div>
            <div class="about-commits">
                <span class="about-commit-label" data-i18n="about-main-commit">Main commit</span>
                <span class="about-commit-value" data-role="about-main-commit" title="Main commit hash"></span>
                <span class="about-commit-label" data-i18n="about-ebpf-commit">eBPF commit</span>
                <span class="about-commit-value" data-role="about-ebpf-commit" title="eBPF commit hash"></span>
            </div>
            <div class="about-copyright" data-role="about-copyright"></div>
            <a class="about-website" data-role="about-website" target="_blank" rel="noopener noreferrer" hidden></a>
            <!-- Space reserved for future credits section -->
            <section class="about-credits" hidden></section>
        </div>
    </dialog>

    <main>
        <section class="section is-active" data-section="connections">
            <div class="section-topbar">
                <div class="control-group">
                    <div class="search-wrap">
                        <svg width="18" height="18" fill="currentColor" opacity="0.33">
                            <use href="sprite/sprite.svg#search-loupe"/>
                        </svg>
                        <input class="search-input" type="search" placeholder="Filter connections..." data-role="search"
                               data-section="connections" data-i18n-placeholder="search-connections-placeholder"/>
                        <button class="search-clear-button" type="button" data-role="search-clear"
                                aria-label="Clear search">
                            <svg width="18" height="18" fill="currentColor">
                                <use href="sprite/sprite.svg#btn-search-clear"/>
                            </svg>
                        </button>
                    </div>
                    <div class="filter-control" data-role="filter-control">
                        <button class="filter-btn" type="button" data-role="filter-toggle" aria-haspopup="true"
                                aria-expanded="false">
                            <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                                 stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                                <line x1="4" y1="6" x2="20" y2="6"/>
                                <line x1="8" y1="12" x2="16" y2="12"/>
                                <line x1="11" y1="18" x2="13" y2="18"/>
                            </svg>
                            <span class="filter-chips" data-role="filter-chips"></span>
                            <span class="filter-placeholder" data-role="filter-placeholder"
                                  data-i18n="filter-placeholder">Filter</span>
                        </button>
                        <div class="filter-popup" data-role="filter-popup" hidden>
                            <div class="filter-popup-row">
                                <label class="filter-popup-label" data-i18n="filter-direction-label">Direction</label>
                                <select class="menu-select" data-role="direction-filter">
                                    <option value="both" data-i18n="filter-dir-any">Any</option>
                                    <option value="out" data-i18n="filter-dir-out">Out only</option>
                                    <option value="in" data-i18n="filter-dir-in">In only</option>
                                </select>
                            </div>
                            <div class="filter-popup-row">
                                <label class="filter-popup-label" data-i18n="filter-remote-label">Remote</label>
                                <select class="menu-select" data-role="location-filter">
                                    <option value="all" data-i18n="filter-remote-all">Internet + Local Nets</option>
                                    <option value="internet" data-i18n="filter-remote-internet">Internet only</option>
                                    <option value="localnet" data-i18n="filter-remote-localnet">Local Nets only</option>
                                    <option value="localhost" data-i18n="filter-remote-localhost">Local Host only
                                    </option>
                                    <option value="everything" data-i18n="filter-remote-everything">Any</option>
                                </select>
                            </div>
                            <div class="filter-popup-row">
                                <label class="filter-popup-label" data-i18n="filter-action-label">Action</label>
                                <select class="menu-select" data-role="verdict-filter">
                                    <option value="any" data-i18n="filter-action-any">Any</option>
                                    <option value="allow" data-i18n="filter-action-allow">Allowed only</option>
                                    <option value="deny" data-i18n="filter-action-deny">Denied only</option>
                                </select>
                            </div>
                        </div>
                    </div>
                    <select class="menu-select compact" data-role="visible-period-filter" title="Visible time period">
                        <option value="60" data-i18n="show-1-minute">Show 1 minute</option>
                        <option value="600" data-i18n="show-10-minutes">Show 10 minutes</option>
                        <option value="3600" data-i18n="show-1-hour">Show 1 hour</option>
                        <option value="21600" data-i18n="show-6-hours">Show 6 hours</option>
                        <option value="86400" data-i18n="show-1-day">Show 1 day</option>
                        <option value="604800" data-i18n="show-7-days">Show 7 days</option>
                        <option value="2592000" data-i18n="show-30-days">Show 30 days</option>
                        <option value="none" data-i18n="show-all">Show all</option>
                    </select>

                </div>
            </div>

            <div class="split-layout" data-section="connections">
                <div class="pane left-pane" data-role="left-pane">
                    <div id="connections-header"></div>
                    <div class="pane-content list-container" data-role="list" id="connections-list"></div>
                </div>
                <div class="splitter" data-role="splitter" aria-hidden="true"></div>
                <div class="pane right-pane" data-role="right-pane">
                    <div class="pane-title" data-i18n="connection-details-header">Connection Details</div>
                    <div class="pane-content details-container" data-role="details" id="inspector">
                        <div id="rules"></div>
                    </div>
                </div>
            </div>
            <div class="h-splitter" data-role="h-splitter" aria-hidden="true"></div>
            <div class="traffic-chart-wrap" id="traffic-chart"></div>
        </section>

        <section class="section" data-section="blocklists">
            <div class="section-topbar">
                <div class="control-group">
                    <div class="search-wrap">
                        <svg width="18" height="18" fill="currentColor" opacity="0.33">
                            <use href="sprite/sprite.svg#search-loupe"/>
                        </svg>
                        <input class="search-input" type="search" placeholder="Filter selected blocklist..."
                               data-role="search"
                               data-section="blocklists" data-i18n-placeholder="search-blocklists-placeholder"/>
                        <button class="search-clear-button" type="button" data-role="search-clear"
                                aria-label="Clear search">
                            <svg width="18" height="18" fill="currentColor">
                                <use href="sprite/sprite.svg#btn-search-clear"/>
                            </svg>
                        </button>
                    </div>
                    <label class="checkbox-label">
                        <input type="checkbox" data-role="blocklist-disabled-only"/><span
                            data-i18n="show-only-disabled">Show only disabled entries</span>
                    </label>
                </div>
            </div>

            <div class="split-layout" data-section="blocklists">
                <div class="pane left-pane" data-role="left-pane">
                    <div class="pane-title" data-i18n="blocklists-header">Blocklists</div>
                    <div class="pane-content list-container" data-role="list" id="blocklists"></div>
                </div>
                <div class="splitter" data-role="splitter" aria-hidden="true"></div>
                <div class="pane right-pane" data-role="right-pane">
                    <div class="pane-title" data-i18n="blocklist-details-header">Blocklist Details</div>
                    <div class="pane-content details-container" data-role="details"></div>
                </div>
            </div>
        </section>

        <section class="section" data-section="rules">
            <div class="section-topbar">
                <div class="control-group">
                    <div class="search-wrap">
                        <svg width="18" height="18" fill="currentColor" opacity="0.33">
                            <use href="sprite/sprite.svg#search-loupe"/>
                        </svg>
                        <input class="search-input" type="search" placeholder="Filter rules..." data-role="search"
                               data-section="rules" data-i18n-placeholder="search-rules-placeholder"/>
                        <button class="search-clear-button" type="button" data-role="search-clear"
                                aria-label="Clear search">
                            <svg width="18" height="18" fill="currentColor">
                                <use href="sprite/sprite.svg#btn-search-clear"/>
                            </svg>
                        </button>
                    </div>
                </div>
            </div>

            <div class="split-layout" data-section="rules">
                <div class="pane left-pane" data-role="left-pane">
                    <div class="pane-content list-container" data-role="list" id="rules-list"></div>
                </div>
                <div class="splitter" data-role="splitter" aria-hidden="true"></div>
                <div class="pane right-pane" data-role="right-pane">
                    <div class="pane-title" data-i18n="rule-details-header">Rule Details</div>
                    <div class="pane-content details-container" data-role="details" id="rules-details"></div>
                </div>
            </div>
        </section>
    </main>
</div>

<script src="js/footer-app.min.js" defer></script>

</body>

</html>
